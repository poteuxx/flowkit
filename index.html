<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowkit | Poteuxx WebApp Hub</title>
    <meta name="description" content="Flowkit par Poteuxx : Une plateforme d'outils tout-en-un centralisée, gratuite et performante.">
    <link rel="stylesheet" href="style.css">
    <script src="js/core/coi-serviceworker.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-shell">
        <!-- Sidebar Navigation -->
        <aside id="sidebar">
            <div class="sidebar-header" style="height: var(--header-height); display: flex; align-items: center; padding: 0 1.5rem;">
                <div class="logo" onclick="window.app.navigate('dashboard')" style="cursor: pointer;">
                    <span style="font-weight: 800; font-size: 1.5rem; letter-spacing: -2px; color: var(--accent-primary);">P<span style="color: var(--text-primary);">O</span><span style="color: var(--accent-primary);">TEUXX</span></span>
                    <p style="font-size: 0.6rem; font-weight: 700; color: var(--text-secondary); margin-top: -5px; letter-spacing: 2px;">FLOWKIT SYSTEM</p>
                </div>
            </div>
            
            <div class="sidebar-search" style="padding: 1rem 1.5rem;">
                <div style="position: relative;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.8rem;"></i>
                    <input type="text" placeholder="Rechercher un outil..." style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 0.5rem; padding: 0.5rem 1rem 0.5rem 2.5rem; color: white; font-size: 0.9rem; outline: none;">
                </div>
            </div>

            <nav id="sidebar-nav" style="flex-grow: 1; padding: 1rem 0.75rem;">
                <!-- Dynamically populated -->
            </nav>

            <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid var(--border-glass);">
                <div class="theme-toggle" id="theme-btn" style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-secondary); cursor: pointer; transition: color 0.2s;">
                    <i class="fa-solid fa-moon"></i>
                    <span style="font-size: 0.9rem; font-weight: 500;">Mode Sombre</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main id="content-area">
            <header id="topbar">
                <div id="mobile-toggle" style="display: none; margin-right: 1.5rem; cursor: pointer;">
                    <i class="fa-solid fa-bars" style="font-size: 1.2rem;"></i>
                </div>
                <div class="breadcrumb" style="flex-grow: 1;">
                    <span id="current-tool-name" style="font-weight: 600; font-size: 1.1rem;">Tableau de Bord</span>
                </div>
                <div class="topbar-actions" style="display: flex; gap: 1.5rem; align-items: center;">
                    <i class="fa-solid fa-bell" style="color: var(--text-secondary); cursor: pointer;"></i>
                    <div style="width: 35px; height: 35px; border-radius: 50%; background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));"></div>
                </div>
            </header>

            <div id="tool-viewport" style="padding: 2.5rem; height: calc(100vh - var(--header-height)); overflow-y: auto;">
                <!-- Individual Tools render here -->
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script src="js/app.js" type="module"></script>
</body>
</html>
